services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: money_manager
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-money_manager}
      POSTGRES_DB: money_manager
    ports:
      - "${POSTGRES_PUBLISH_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U money_manager -d money_manager"]
      interval: 5s
      timeout: 5s
      retries: 5

  ocr:
    build:
      context: ./apps/ocr
      dockerfile: Dockerfile
    environment:
      OCR_LANGUAGES: ${OCR_LANGUAGES:-pt,en}

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://money_manager:${POSTGRES_PASSWORD:-money_manager}@postgres:5432/money_manager
      RUN_DB_MIGRATIONS: "true"
      API_HOST: 0.0.0.0
      API_PORT: 3001
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - api

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_USE_POLLING: ${TELEGRAM_USE_POLLING:-false}
      BOT_PORT: 3002
      API_INTERNAL_URL: http://api:3001
      OCR_SERVICE_URL: http://ocr:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      - api
      - ocr

volumes:
  pgdata:
