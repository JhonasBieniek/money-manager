services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-money_manager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-money_manager}
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-money_manager} -d ${POSTGRES_DB:-money_manager}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-money_manager}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-money_manager}
      NODE_ENV: ${NODE_ENV:-development}
      API_HOST: 0.0.0.0
      API_PORT: 3001
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-min-32-characters-long-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-min-32-characters-long-change-me}
      RUN_DB_MIGRATIONS: ${RUN_DB_MIGRATIONS:-true}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
